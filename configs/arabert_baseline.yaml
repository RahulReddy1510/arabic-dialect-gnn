# configs/arabert_baseline.yaml
#
# Configuration for the AraBERT fine-tuning baseline.
# These are the exact hyperparameters used to achieve 81.7% macro F1.
#
# Usage:
#   python training/train_arabert.py --config configs/arabert_baseline.yaml

# ============================================================
# Baseline
# ============================================================
baseline:
  model_name: "aubmindlab/bert-base-arabert"
  max_length: 128          # Covers >98% of MADAR sentences without truncation
  batch_size: 32
  lr: 2.0e-5               # Standard BERT fine-tuning LR (Devlin et al., 2019)
  warmup_steps: 100        # ~1 epoch warmup on MADAR training set
  epochs: 5                # Converges in 3–5 epochs; 5 is safe
  dropout: 0.1
  gradient_clip: 1.0

# ============================================================
# Data
# ============================================================
data:
  data_dir: "data/processed"   # Directory with train.csv, val.csv, test.csv

# ============================================================
# Notes
# ============================================================
# Why 2e-5? Standard BERT fine-tuning LRs are in [1e-5, 5e-5].
# I tested 1e-5, 2e-5, and 3e-5. 2e-5 converged most cleanly.
# 3e-5 had minor instability in epoch 1 (loss spike before recovery).
#
# Why 5 epochs?
# AraBERT achieves ~80% macro F1 after epoch 2, peaks at epoch 4–5,
# and then shows slight overfitting. 5 epochs with early checkpoint
# saving is the right call.
